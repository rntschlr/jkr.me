<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="index, follow" />
    <meta name="description" content="Jack Rentschler — Developer at the intersection of finance and computer science. Building clean, responsive web experiences with React, TypeScript, and modern tooling." />
    <meta name="keywords" content="Jack Rentschler, web developer, finance, computer science, React, TypeScript, portfolio, full-stack, Hungary" />
    <meta name="author" content="Jack Rentschler" />
    <meta name="theme-color" content="#0a0a0f" />

    <link rel="canonical" href="https://johnkrentschler.me/" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌘</text></svg>" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://johnkrentschler.me/" />
    <meta property="og:title" content="Jack Rentschler — Finance × Code" />
    <meta property="og:description" content="Developer at the intersection of finance and computer science." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jack Rentschler — Finance × Code" />
    <meta name="twitter:description" content="Developer at the intersection of finance and computer science." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Jack Rentschler",
      "url": "https://johnkrentschler.me",
      "image": "https://johnkrentschler.me/profile.jpg",
      "jobTitle": "Web Developer",
      "description": "Developer at the intersection of finance and computer science",
      "email": "johnkrentschler@icloud.com",
      "sameAs": ["https://github.com/rntschlr"],
      "knowsAbout": ["Web Development", "Finance", "React", "TypeScript", "Node.js", "Python"]
    }
    </script>

    <!-- Prevent theme flash: set data-theme before first paint -->
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark' || saved === 'light') {
          document.documentElement.dataset.theme = saved;
        } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>

    <!-- Open Graph Image -->
    <meta property="og:image" content="https://johnkrentschler.me/profile.jpg" />

    <!-- Twitter Image -->
    <meta name="twitter:image" content="https://johnkrentschler.me/profile.jpg" />

    <!-- Fonts (non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

    <title>Jack Rentschler — Finance × Code</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
